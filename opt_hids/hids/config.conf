# =============================================================================
# config.conf — HIDS Configuration File
# =============================================================================
# All thresholds, paths, and whitelists are defined here.
# Edit this file to adapt the tool to your environment.
# Do NOT edit the module scripts directly for tuning.
# =============================================================================

# --- GENERAL -----------------------------------------------------------------
HIDS_DATA_DIR="/var/lib/hids"
HIDS_OUTPUT_DIR="/var/log/hids"
ALERT_LOG="${HIDS_OUTPUT_DIR}/alerts.json"
ALERT_STATE_FILE="${HIDS_DATA_DIR}/alert_state.db"
REPORT_FILE="${HIDS_OUTPUT_DIR}/report.txt"
HIDS_HOSTNAME=""
ALERT_EMAIL="denis.clairbois@gmail.com"
MAIL_CMD="msmtp"

# --- MODULE 1: SYSTEM HEALTH -------------------------------------------------
# Alert if 1-min load > LOAD_MULTIPLIER × nproc
LOAD_MULTIPLIER=2.0
# Alert if available RAM drops below this value (MB)
THRESHOLD_RAM_MB=512
# Alert if any filesystem exceeds this usage percentage
THRESHOLD_DISK_PCT=85
# Alert if swap used exceeds this percentage of total swap
THRESHOLD_SWAP_PCT=70
# Alert if iowait percentage exceeds this value
THRESHOLD_IOWAIT_PCT=30
# Alert if open file descriptor count exceeds this value
THRESHOLD_FD_COUNT=65000
# EXclude the VMs Disks
DISK_EXCLUDE_MOUNTPOINTS="/media"

# --- MODULE 2: USER ACTIVITY -------------------------------------------------
# Max failed login attempts per source IP before alerting
THRESHOLD_FAILED_LOGINS=5
# Comma-separated hours considered off-hours (24h, e.g. "0,1,2,3,22,23")
OFF_HOURS=""
# Trusted source IPs/subnets for SSH logins (empty = disable source check)
TRUSTED_SSH_SOURCES="192.168.1.0/24"
# Group membership changes to these groups trigger CRITICAL
SENSITIVE_GROUPS="sudo,wheel,docker,adm,shadow,disk"

# --- MODULE 3: PROCESS & NETWORK AUDIT ---------------------------------------
# Whitelisted listening ports (comma-separated)
WHITELIST_PORTS="21,22,53,80,443,123,25,587,993,995,631,5353,3306,5432"
WHITELIST_PORTS_FILE="${HIDS_DATA_DIR}/whitelist_ports.conf"
# Directories considered suspicious as binary or working directory locations
SUSPICIOUS_PATHS="/tmp,/var/tmp,/dev/shm,/run/shm"
WHITELIST_SUSPICIOUS_PROCS="snapd-desktop-i,ps"
# Outbound ports that trigger an alert when seen in established connections
ALERT_OUTBOUND_PORTS="4444,1337,31337,8080,9090,6667,6666"
# Per-process CPU/RAM thresholds (0 = disabled)
THRESHOLD_PROC_CPU=90
THRESHOLD_PROC_MEM=50

# --- MODULE 4: FILE INTEGRITY ------------------------------------------------
# Individual files to hash and monitor
INTEGRITY_WATCH="
/etc/passwd
/etc/shadow
/etc/group
/etc/gshadow
/etc/sudoers
/etc/ssh/sshd_config
/etc/hosts
/etc/crontab
/etc/ld.so.conf
/etc/fstab
"
# Directories to scan recursively
INTEGRITY_WATCH_DIRS="
/etc/sudoers.d
/etc/pam.d
/etc/cron.d
/etc/cron.daily
/etc/cron.hourly
"
INTEGRITY_DEPTH=3
# Directories to scan for world-writable files
WORLD_WRITABLE_SCAN="/etc /bin /sbin /usr/bin /usr/sbin /usr/local/bin"
# Root paths for SUID/SGID binary scan
SUID_SCAN_PATHS="/"
# Paths to prune from SUID scan
SUID_SCAN_EXCLUDE="
/proc
/sys
/dev
/run
/snap
"
# Alert if critical file modified within last N minutes (0 = disabled)
INTEGRITY_RECENT_MINUTES=15
INTEGRITY_RECENT_EXCLUDE="/etc/cups,/root/.lesshst"

# --- MODULE 5: ALERTING ------------------------------------------------------
# Minimum severity to write to JSON log (INFO|WARN|CRITICAL)
LOG_MIN_SEVERITY="INFO"
# Minimum severity to display in terminal
DISPLAY_MIN_SEVERITY="WARN"
# Minimum severity to send email notification
EMAIL_MIN_SEVERITY="CRITICAL"
# Suppress repeated identical alerts within this window (seconds, 0 = disabled)
DEDUP_WINDOW_SECONDS=300
# Max lines in JSON alert log before rotation
ALERT_LOG_MAX_LINES=10000
WHITELIST_SUID_FILE="${HIDS_DATA_DIR}/whitelist_suid.conf"

# --- LIVE MONITOR MODE -------------------------------------------------------
LIVE_REFRESH_SECONDS=5
LIVE_SLOW_REFRESH_SECONDS=60
LIVE_ALERT_LINES=10
